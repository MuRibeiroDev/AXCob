# nginx do frontend: serve o SPA estático E encaminha /api -> backend.
# É o ÚNICO container publicado (porta 2555 -> 80). O backend fica interno.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Limite de corpo (uploads/relatórios)
    client_max_body_size 25m;

    # DNS interno do Docker: resolve "backend" em tempo de request, então recriar
    # o backend num rebuild/deploy (IP novo) NÃO deixa o nginx preso ao IP antigo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Compressão dos assets de texto
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API -> backend NestJS (mantém o prefixo /api via $request_uri)
    location /api/ {
        set $backend backend:3000;
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }

    # Assets versionados pelo Vite (hash no nome) -> cache longo e imutável
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # index.html nunca em cache (garante pegar o build mais novo)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: rota desconhecida cai no index.html (react-router resolve no cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
