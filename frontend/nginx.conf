# Servidor estático do SPA (container do frontend, porta interna 80).
# O roteamento público é feito pelo nginx-proxy (porta 2555).
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compressão dos assets de texto
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets versionados pelo Vite (hash no nome) -> cache longo e imutável
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # index.html nunca em cache (garante pegar o build mais novo)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: rota desconhecida cai no index.html (react-router resolve no cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
