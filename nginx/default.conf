# ───────────────────────── AxCob — Proxy reverso ─────────────────────────
# Único ponto de entrada (porta 2555 publicada). Decide o destino por caminho:
#   /api/...  -> container do backend (NestJS, prefixo global /api preservado)
#   /...      -> container do frontend (SPA estático servido por nginx)

upstream axcob_backend {
    server backend:3000;
    keepalive 32;
}

upstream axcob_frontend {
    server frontend:80;
}

server {
    listen       80;
    server_name  _;

    # Limite de corpo (uploads/relatórios)
    client_max_body_size 25m;

    # Logs vão p/ stdout/stderr (capturados pelo Docker e rotacionados pelo compose)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # API -> backend NestJS (mantém o prefixo /api)
    location /api/ {
        proxy_pass         http://axcob_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 120s;
    }

    # Tudo o mais -> frontend (SPA)
    location / {
        proxy_pass         http://axcob_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
