# ───────────────────────── AxCob — Proxy reverso ─────────────────────────
# Único ponto de entrada (porta 2555 publicada). Decide o destino por caminho:
#   /api/...  -> container do backend (NestJS, prefixo global /api preservado)
#   /...      -> container do frontend (SPA estático servido por nginx)
#
# Os upstreams são resolvidos via DNS interno do Docker (127.0.0.11) EM TEMPO DE
# REQUEST (proxy_pass com variável). Assim, ao recriar backend/frontend num
# rebuild/deploy (IP novo), o proxy não fica preso ao IP antigo — evita 502 após
# "docker compose up -d --build". Também deixa o proxy subir mesmo se o upstream
# ainda não estiver pronto (resolve quando a 1ª request chega).

server {
    listen       80;
    server_name  _;

    # Limite de corpo (uploads/relatórios)
    client_max_body_size 25m;

    # DNS embarcado do Docker; valid=10s reavalia o IP periodicamente
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Logs p/ stdout/stderr (capturados pelo Docker e rotacionados pelo compose)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # API -> backend NestJS (mantém o prefixo /api via $request_uri)
    location /api/ {
        set $backend backend:3000;
        proxy_pass http://$backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 120s;
    }

    # Tudo o mais -> frontend (SPA)
    location / {
        set $frontend frontend:80;
        proxy_pass http://$frontend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
